#
# 20-toolchain.yml
# Install aarch64 cross-compiler for i.MX 93 application builds (from catalog).
#
- name: "Create toolchain destination"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; creating the toolchain installation directory."
  command: "mkdir -p /opt/nxp/imx93/toolchain"
  creates: "/opt/nxp/imx93/toolchain"

- name: "Install aarch64 Linux toolchain"
  action: "unarchive_from_ref"
  ref: "toolchain.arm-gnu.aarch64-none-linux-gnu@stable"
  dest: "/opt/nxp/imx93/toolchain"
  strip_components: 1
  creates: "/opt/nxp/imx93/toolchain/bin/aarch64-none-linux-gnu-gcc"
  mode: "USER_RWX GROUP_RX OTHER_RX"
  owner: "root:root"

- name: "Add toolchain to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/20-nxp-imx93-toolchain.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:/opt/nxp/imx93/toolchain/bin
    export CROSS_COMPILE=aarch64-none-linux-gnu-
  mode: "USER_RWX GROUP_RX OTHER_RX"
