#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print i.MX 6ULL environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== NXP i.MX 6ULL EVK Dev Environment Ready ==="
    echo ""
    echo "arm toolchain:"
    {{.Vars.TOOLCHAIN_DEST}}/bin/arm-none-linux-gnueabihf-gcc --version | head -1
    echo ""
    echo "CMake toolchain: {{.Vars.TOOLCHAIN_FILES_DIR}}/imx6ull.cmake"
    echo ""
    echo "Quick start:"
    echo "  cmake -DCMAKE_TOOLCHAIN_FILE={{.Vars.TOOLCHAIN_FILES_DIR}}/imx6ull.cmake -B build"
    echo "  arm-none-linux-gnueabihf-gcc -march=armv7-a -mfpu=neon -mfloat-abi=hard -o hello hello.c"
    echo ""
    echo "For full BSP/Yocto builds, see: generic/yocto-image-builder"
    echo ""
