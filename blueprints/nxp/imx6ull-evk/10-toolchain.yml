#
# 10-toolchain.yml
# arm-none-linux-gnueabihf cross-compiler for NXP i.MX 6ULL (Cortex-A7, 32-bit Linux).
#
- name: "Create toolchain directories"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; creating both TOOLCHAIN_DEST and TOOLCHAIN_FILES_DIR in a single step."
  command: |
    mkdir -p {{.Vars.TOOLCHAIN_DEST}}
    mkdir -p {{.Vars.TOOLCHAIN_FILES_DIR}}
  creates: "{{.Vars.TOOLCHAIN_FILES_DIR}}"

- name: "Install arm Linux toolchain"
  action: "unarchive_from_ref"
  ref: "toolchain.arm-gnu.arm-none-linux-gnueabihf@stable"
  dest: "{{.Vars.TOOLCHAIN_DEST}}"
  strip_components: 1
  creates: "{{.Vars.TOOLCHAIN_DEST}}/bin/arm-none-linux-gnueabihf-gcc"
  mode: "USER_RWX GROUP_RX OTHER_RX"
  owner: "root:root"

- name: "Add toolchain to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/21-nxp-imx6ull-toolchain.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:{{.Vars.TOOLCHAIN_DEST}}/bin
    export CROSS_COMPILE=arm-none-linux-gnueabihf-
  mode: "USER_RWX GROUP_RX OTHER_RX"

- name: "Create CMake toolchain file for i.MX 6ULL"
  action: "write_env_file"
  file: "{{.Vars.TOOLCHAIN_FILES_DIR}}/imx6ull.cmake"
  content: |
    # CMake Toolchain File for NXP i.MX 6ULL (Cortex-A7, 32-bit Linux)
    set(CMAKE_SYSTEM_NAME Linux)
    set(CMAKE_SYSTEM_PROCESSOR arm)
    set(TOOLCHAIN_PREFIX arm-none-linux-gnueabihf)
    set(TOOLCHAIN_PATH {{.Vars.TOOLCHAIN_DEST}})
    set(CMAKE_C_COMPILER   ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-gcc)
    set(CMAKE_CXX_COMPILER ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-g++)
  mode: "USER_RW GROUP_R OTHER_R"
