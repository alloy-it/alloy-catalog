# Alloy Blueprint: nxp/imx8mplus-evk
#
# Yocto-based dev environment for NXP i.MX 8M Plus (e.g. FRDM-iMX8MPLUS).
# Uses NXP's imx-manifest (repo tool) for layer management.
#
name: "NXP i.MX 8M Plus EVK Dev Environment"
version: "1.0.0"
description: "Yocto/BSP environment for NXP i.MX 8M Plus EVK using NXP imx-manifest."

variables:
  BUILD_DIR: "/opt/yocto/imx8mplus"
  IMX_MANIFEST_BRANCH: "imx-linux-kirkstone"
  IMX_MANIFEST_FILE: "imx-5.15.71-2.2.0.xml"
  IMX_MANIFEST_URL: "https://github.com/nxp-imx/imx-manifest"

supported_hosts:
  - linux/amd64
  - linux/arm64

toolchains:
  - ref: "toolchain.arm-gnu.aarch64-none-linux-gnu@stable"
    alias: TOOLCHAIN_64BIT

run_order:
  - "00-system-base.yml"
  - "10-yocto-repo.yml"
  - "20-toolchain.yml"
  - "99-cleanup.yml"
