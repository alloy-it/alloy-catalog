#
# 00-system-base.yml
# Base system and repo tool for NXP i.MX Yocto builds.
#
- name: "Update APT cache"
  action: "run_command"
  reason: "apt-get update has no dedicated primitive; must run before any apt_install step."
  command: "apt-get update -y"
  always_run: true

- name: "Install Yocto and NXP build dependencies"
  action: "apt_install"
  packages:
    - "git"
    - "build-essential"
    - "cmake"
    - "ninja-build"
    - "gawk"
    - "wget"
    - "curl"
    - "diffstat"
    - "unzip"
    - "texinfo"
    - "gcc-multilib"
    - "libssl-dev"
    - "libncurses5-dev"
    - "python3"
    - "python3-pip"
    - "python3-venv"
    - "chrpath"
    - "socat"
    - "cpio"
    - "file"
    - "ca-certificates"

- name: "Install Google repo tool"
  action: "run_command"
  reason: "Downloading and installing Google repo has no dedicated primitive; it is a standalone Python script fetched from Google's servers and installed to a system binary path."
  command: |
    curl -sSf https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
    chmod a+x /usr/local/bin/repo
  creates: "/usr/local/bin/repo"

- name: "Allow passwordless sudo for sudo group"
  action: "run_command"
  reason: "Appending to /etc/sudoers has no dedicated primitive; echo redirect is the standard approach."
  command: "echo '%sudo	ALL=(ALL:ALL) NOPASSWD:ALL' >> /etc/sudoers"
  creates: "/etc/sudoers.d/alloy-sudoers"
