#
# 10-toolchain.yml
# arm-none-eabi cross-compiler for NXP i.MX RT1060 (Cortex-M7, bare-metal).
#
- name: "Create toolchain directories"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; creating both TOOLCHAIN_DEST and TOOLCHAIN_FILES_DIR in a single step."
  command: |
    mkdir -p {{.Vars.TOOLCHAIN_DEST}}
    mkdir -p {{.Vars.TOOLCHAIN_FILES_DIR}}
  creates: "{{.Vars.TOOLCHAIN_FILES_DIR}}"

- name: "Install arm-none-eabi toolchain"
  action: "unarchive_from_ref"
  ref: "toolchain.arm-gnu.arm-none-eabi@stable"
  dest: "{{.Vars.TOOLCHAIN_DEST}}"
  strip_components: 1
  creates: "{{.Vars.TOOLCHAIN_DEST}}/bin/arm-none-eabi-gcc"
  mode: "USER_RWX GROUP_RX OTHER_RX"
  owner: "root:root"

- name: "Add toolchain to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/23-nxp-imxrt1060-toolchain.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:{{.Vars.TOOLCHAIN_DEST}}/bin
    export CROSS_COMPILE=arm-none-eabi-
  mode: "USER_RWX GROUP_RX OTHER_RX"

- name: "Create CMake toolchain file for i.MX RT1060"
  action: "write_env_file"
  file: "{{.Vars.TOOLCHAIN_FILES_DIR}}/imxrt1060.cmake"
  content: |
    # CMake Toolchain File for NXP i.MX RT1060 (Cortex-M7, bare-metal)
    set(CMAKE_SYSTEM_NAME Generic)
    set(CMAKE_SYSTEM_PROCESSOR ARM)

    set(TOOLCHAIN_PREFIX arm-none-eabi)
    set(TOOLCHAIN_PATH {{.Vars.TOOLCHAIN_DEST}})

    set(CMAKE_C_COMPILER   ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-gcc)
    set(CMAKE_CXX_COMPILER ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-g++)
    set(CMAKE_ASM_COMPILER ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-gcc)
    set(CMAKE_OBJCOPY      ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-objcopy)
    set(CMAKE_SIZE         ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-size)

    # Cortex-M7 with double-precision FPU
    set(CPU_FLAGS "-mcpu=cortex-m7 -mfpu=fpv5-d16 -mfloat-abi=hard -mthumb")
    set(CMAKE_C_FLAGS_INIT   "${CPU_FLAGS}")
    set(CMAKE_CXX_FLAGS_INIT "${CPU_FLAGS}")
    set(CMAKE_ASM_FLAGS_INIT "${CPU_FLAGS}")

    # Do not search for libraries, headers, or programs in the host sysroot.
    set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
    set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
    set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
    set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
  mode: "USER_RW GROUP_R OTHER_R"

- name: "Install i.MX RT debug probe udev rules"
  action: "write_env_file"
  file: "/etc/udev/rules.d/99-imxrt.rules"
  content: |
    # J-Link (used on MIMXRT1060-EVKB and SparkFun MicroMod)
    SUBSYSTEM=="usb", ATTRS{idVendor}=="1366", MODE="0666", GROUP="plugdev"
    # MCU-Link (NXP onboard probe, newer EVK revisions)
    SUBSYSTEM=="usb", ATTRS{idVendor}=="1fc9", ATTRS{idProduct}=="0143", MODE="0666", GROUP="plugdev"
    # LPC-Link2 (legacy NXP debug probe)
    SUBSYSTEM=="usb", ATTRS{idVendor}=="1fc9", ATTRS{idProduct}=="0090", MODE="0666", GROUP="plugdev"
  mode: "USER_RW GROUP_R OTHER_R"
