# Alloy Blueprint: nxp/imxrt1060-evk
#
# Bare-metal cross-compilation environment for NXP i.MX RT1060 (Cortex-M7).
# Used on MIMXRT1060-EVKB, SparkFun MicroMod, Teensy 4.0, and Teensy 4.1.
#
name: "NXP i.MX RT1060 EVK Dev Environment"
version: "1.0.0"
description: "Bare-metal cross-compilation toolchain for NXP i.MX RT1060 (Cortex-M7, arm-none-eabi)."

variables:
  TOOLCHAIN_DEST: "/opt/nxp/imxrt1060/toolchain"
  TOOLCHAIN_FILES_DIR: "/opt/nxp/cmake"

supported_hosts:
  - linux/amd64
  - linux/arm64

toolchains:
  - ref: "toolchain.arm-gnu.arm-none-eabi@stable"
    alias: TOOLCHAIN

run_order:
  - "00-system-base.yml"
  - "10-toolchain.yml"
  - "99-cleanup.yml"
