#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print i.MX 8M Mini environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== NXP i.MX 8M Mini EVK Dev Environment Ready ==="
    echo ""
    echo "Yocto workspace: {{.Vars.BUILD_DIR}}"
    echo "Cross-compiler: /opt/nxp/imx8mmini/toolchain/bin/aarch64-none-linux-gnu-gcc"
    echo ""
    echo "To build image: cd {{.Vars.BUILD_DIR}} && source setup-env.sh && MACHINE=imx8mmevk bitbake imx-image-full"
    echo ""
