# Alloy Blueprint: nrf52
#
# Development environment for Nordic nRF52 series (nRF52832, nRF52840, etc.)
# with nRF Connect SDK and Zephyr RTOS.
#
name: "Nordic nRF52 Dev Environment"
version: "1.1.3"
description: "Provides the nRF Connect SDK, ARM toolchain, and development tools for nRF52 series."

# DEV_USERNAME is not set here — the provisioner auto-detects it from
# $SUDO_USER (or $USER as fallback) at runtime. Override via .env only
# when provisioning for a different user. See .env.example.
variables:
  ARM_TOOLCHAIN_DEST: "/opt/arm-none-eabi"
  ZEPHYR_SDK_DEST: "/opt/zephyr-sdk"
  NCS_VERSION: "v2.9.0"
  NCS_URL: "https://github.com/nrfconnect/sdk-nrf"
  NCS_BASE: "/opt/nordic/ncs"
  WEST_VERSION: "1.3.0"
  NRF_TOOLS_DEST: "/opt/nrf-command-line-tools"

supported_hosts:
  - linux/amd64
  - linux/arm64

toolchains:
  - ref: "toolchain.arm-gnu.arm-none-eabi@stable"
    alias: ARM_TOOLCHAIN
  - ref: "sdk.zephyr.zephyr-sdk@stable"
    alias: ZEPHYR_SDK
  - ref: "tool.nordic.nrf-command-line-tools@stable"
    alias: NRF_TOOLS
  - ref: "sdk.nordic.nrf-connect-sdk@stable"
    alias: NCS
  - ref: "tool.python.west@stable"
    alias: WEST

run_order:
  - "00-system-base.yml"
  - "10-arm-zephyr.yml"
  - "20-nrf-sdk.yml"
  - "99-cleanup.yml"
