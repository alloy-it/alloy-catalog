#
# 20-nrf-sdk.yml
# Installs West, nRF Connect SDK, and Nordic command line tools.
#
# SDK source: sdk.nordic.nrf-connect-sdk@stable  → NCS_URL / NCS_VERSION
# West tool:  tool.python.west@stable             → WEST_VERSION
#

# --- West tool (from catalog: tool.python.west@stable) ---
# West must be in PATH before the mcu_sdk step below.
- name: "Clean up previous root pip installations"
  action: "run_command"
  reason: "One-time migration: removes west installed system-wide or as root, which conflicts with user-scoped install via python_package."
  run_as: "{{.Vars.DEV_USERNAME}}"
  command: |
    if [ -f /root/.local/bin/west ]; then
      rm -rf /root/.local/lib/python3*/site-packages/west*
      rm -f /root/.local/bin/west
    fi
    if [ -f /usr/local/bin/west ]; then
      pip3 uninstall -y west 2>/dev/null || true
    fi

# Install west at the catalog-pinned version.
# URL resolved from: tool.python.west@stable → pip package west=={{.Vars.WEST_VERSION}}
- name: "Install West"
  action: "python_package"
  package: "west"
  version: "{{.Vars.WEST_VERSION}}"

# Install Zephyr/nRF helper packages required by west build commands.
# These are transitive dependencies of the SDK, not first-class catalog entries.
- name: "Install West Python helper packages"
  action: "run_command"
  reason: "Batch install of SDK transitive Python deps (pyelftools, pyyaml, etc.) has no dedicated primitive; these are pip packages without individual version pins in the catalog."
  run_as: "{{.Vars.DEV_USERNAME}}"
  command: |
    PIP_BREAK_FLAG=""
    if pip3 install --break-system-packages --help >/dev/null 2>&1; then
      PIP_BREAK_FLAG="--break-system-packages"
    fi
    pip3 install $PIP_BREAK_FLAG --user \
      pyelftools \
      pyyaml \
      pykwalify \
      canopen \
      packaging \
      progress \
      psutil \
      anytree \
      intelhex \
      cryptography \
      cbor2

- name: "Add West to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/20-west.sh"
  content: |
    #!/bin/sh
    export ZEPHYR_BASE={{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/zephyr
    export PATH=$PATH:$HOME/.local/bin
  mode: "USER_RWX GROUP_RX OTHER_RX"

# --- nRF Connect SDK (from catalog: sdk.nordic.nrf-connect-sdk@stable) ---
# URL: {{.Vars.NCS_URL}}  Version: {{.Vars.NCS_VERSION}}
- name: "Initialize nRF Connect SDK with West"
  action: "mcu_sdk"
  method: "west"
  url: "{{.Vars.NCS_URL}}"
  version: "{{.Vars.NCS_VERSION}}"
  dest: "{{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}"
  run_as: "{{.Vars.DEV_USERNAME}}"
  creates: "{{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/nrf"

# After west update, run zephyr-export so CMake can find the Zephyr packages.
- name: "Export Zephyr CMake packages"
  action: "run_command"
  reason: "west zephyr-export registers Zephyr CMake package paths in the user's CMake cache; no dedicated primitive covers CMake package registration."
  run_as: "{{.Vars.DEV_USERNAME}}"
  command: |
    export PATH=$HOME/.local/bin:$PATH
    cd {{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}} && west zephyr-export
  creates: "{{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/.zephyr_exported"

# Install the SDK's pinned Python requirements from vendored requirements.txt files.
- name: "Install nRF Connect SDK Python requirements"
  action: "run_command"
  reason: "pip install -r requirements.txt installs packages from a vendored requirements file inside the cloned SDK; no dedicated primitive covers requirements-file installs."
  run_as: "{{.Vars.DEV_USERNAME}}"
  command: |
    export PATH=$HOME/.local/bin:$PATH
    PIP_BREAK_FLAG=""
    if pip3 install --break-system-packages --help >/dev/null 2>&1; then
      PIP_BREAK_FLAG="--break-system-packages"
    fi
    pip3 install $PIP_BREAK_FLAG --user \
      -r {{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/zephyr/scripts/requirements.txt
    pip3 install $PIP_BREAK_FLAG --user \
      -r {{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/nrf/scripts/requirements.txt
    pip3 install $PIP_BREAK_FLAG --user \
      -r {{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/bootloader/mcuboot/scripts/requirements.txt
    touch {{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/.python_deps_installed
  creates: "{{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/.python_deps_installed"

# --- Nordic Command Line Tools (from catalog: tool.nordic.nrf-command-line-tools@stable) ---
- name: "Install Nordic nRF Command Line Tools"
  action: "unarchive_from_ref"
  ref: "tool.nordic.nrf-command-line-tools@stable"
  dest: "{{.Vars.NRF_TOOLS_DEST}}"
  creates: "{{.Vars.NRF_TOOLS_DEST}}/bin/nrfjprog"
  mode: "USER_RWX GROUP_RX OTHER_RX"

- name: "Add Nordic tools to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/21-nrf-tools.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:{{.Vars.NRF_TOOLS_DEST}}/bin
  mode: "USER_RWX GROUP_RX OTHER_RX"

# --- CMake presets for nRF91 boards ---
# These are Zephyr-specific CMake files (BOARD, ZEPHYR_BASE, CMAKE_MODULE_PATH),
# not generic cross-compilation toolchain files — use write_env_file rather than cmake_toolchain.
- name: "Create CMake toolchain file for nRF9160"
  action: "write_env_file"
  file: "/opt/nordic/cmake/nrf9160.cmake"
  content: |
    # CMake configuration for nRF9160 with nRF Connect SDK
    # Use with: cmake -DCMAKE_TOOLCHAIN_FILE=/opt/nordic/cmake/nrf9160.cmake

    set(BOARD nrf9160dk_nrf9160_ns)
    set(ZEPHYR_BASE {{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/zephyr)
    set(GNUARMEMB_TOOLCHAIN_PATH {{.Vars.ARM_TOOLCHAIN_DEST}})

    # Include Zephyr's CMake configuration
    list(APPEND CMAKE_MODULE_PATH ${ZEPHYR_BASE}/cmake)
  mode: "USER_RW GROUP_R OTHER_R"

- name: "Create CMake toolchain file for nRF9161"
  action: "write_env_file"
  file: "/opt/nordic/cmake/nrf9161.cmake"
  content: |
    # CMake configuration for nRF9161 with nRF Connect SDK
    # Use with: cmake -DCMAKE_TOOLCHAIN_FILE=/opt/nordic/cmake/nrf9161.cmake

    set(BOARD nrf9161dk_nrf9161_ns)
    set(ZEPHYR_BASE {{.Vars.NCS_BASE}}/{{.Vars.NCS_VERSION}}/zephyr)
    set(GNUARMEMB_TOOLCHAIN_PATH {{.Vars.ARM_TOOLCHAIN_DEST}})

    # Include Zephyr's CMake configuration
    list(APPEND CMAKE_MODULE_PATH ${ZEPHYR_BASE}/cmake)
  mode: "USER_RW GROUP_R OTHER_R"
