#
# 10-toolchain.yml
# aarch64 cross-compiler for Jetson Nano (L4T is aarch64).
#
- name: "Create toolchain directories"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; pre-creating the destination directory tree ensures subsequent archive extractions land in the correct location."
  command: |
    mkdir -p {{.Vars.TOOLCHAIN_DEST}}
    mkdir -p {{.Vars.TOOLCHAIN_FILES_DIR}}
  creates: "{{.Vars.TOOLCHAIN_FILES_DIR}}"

- name: "Install aarch64 Linux toolchain"
  action: "unarchive_from_ref"
  ref: "toolchain.arm-gnu.aarch64-none-linux-gnu@stable"
  dest: "{{.Vars.TOOLCHAIN_DEST}}"
  strip_components: 1
  creates: "{{.Vars.TOOLCHAIN_DEST}}/bin/aarch64-none-linux-gnu-gcc"
  mode: "USER_RWX GROUP_RX OTHER_RX"
  owner: "root:root"

- name: "Add toolchain to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/21-jetson-toolchain.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:{{.Vars.TOOLCHAIN_DEST}}/bin
    export CROSS_COMPILE=aarch64-none-linux-gnu-
  mode: "USER_RWX GROUP_RX OTHER_RX"

- name: "Create CMake toolchain file for Jetson Nano"
  action: "write_env_file"
  file: "{{.Vars.TOOLCHAIN_FILES_DIR}}/jetson-nano.cmake"
  content: |
    # CMake Toolchain File for NVIDIA Jetson Nano (aarch64)
    set(CMAKE_SYSTEM_NAME Linux)
    set(CMAKE_SYSTEM_PROCESSOR aarch64)
    set(TOOLCHAIN_PREFIX aarch64-none-linux-gnu)
    set(TOOLCHAIN_PATH {{.Vars.TOOLCHAIN_DEST}})
    set(CMAKE_C_COMPILER ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-gcc)
    set(CMAKE_CXX_COMPILER ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-g++)
  mode: "USER_RW GROUP_R OTHER_R"
