# Alloy Blueprint: nvidia/jetson-nano
#
# Cross-compilation and dev environment for NVIDIA Jetson Nano (L4T/JetPack).
# Provides aarch64 toolchain; JetPack SDK install is documented in README.
#
name: "NVIDIA Jetson Nano Dev Environment"
version: "1.0.0"
description: "Cross-compilation toolchain and dev tools for NVIDIA Jetson Nano (aarch64)."

variables:
  TOOLCHAIN_DEST: "/opt/jetson-nano/toolchain"
  TOOLCHAIN_FILES_DIR: "/opt/jetson-nano/cmake"

supported_hosts:
  - linux/amd64
  - linux/arm64

toolchains:
  - ref: "toolchain.arm-gnu.aarch64-none-linux-gnu@stable"
    alias: TOOLCHAIN

run_order:
  - "00-system-base.yml"
  - "10-toolchain.yml"
  - "99-cleanup.yml"
