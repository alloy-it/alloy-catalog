#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print Jetson Orin environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== NVIDIA Jetson Orin Dev Environment Ready ==="
    echo ""
    echo "aarch64 toolchain:"
    {{.Vars.TOOLCHAIN_DEST}}/bin/aarch64-none-linux-gnu-gcc --version | head -1
    echo ""
    echo "CMake toolchain: {{.Vars.TOOLCHAIN_FILES_DIR}}/jetson-orin.cmake"
    echo ""
    echo "For CUDA/TensorRT, install JetPack 6.x on the Jetson device."
    echo "See README for SDK Manager instructions."
    echo ""
