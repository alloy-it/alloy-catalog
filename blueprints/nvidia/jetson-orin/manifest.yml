# Alloy Blueprint: nvidia/jetson-orin
#
# Cross-compilation environment for NVIDIA Jetson Orin (Cortex-A78AE, aarch64).
# Covers Orin Nano, Orin NX, and AGX Orin modules running JetPack 6.x.
# Provides aarch64 toolchain; JetPack SDK install is documented in README.
#
name: "NVIDIA Jetson Orin Dev Environment"
version: "1.0.0"
description: "Cross-compilation toolchain and dev tools for NVIDIA Jetson Orin (aarch64)."

variables:
  TOOLCHAIN_DEST: "/opt/jetson-orin/toolchain"
  TOOLCHAIN_FILES_DIR: "/opt/jetson-orin/cmake"

supported_hosts:
  - linux/amd64
  - linux/arm64

toolchains:
  - ref: "toolchain.arm-gnu.aarch64-none-linux-gnu@stable"
    alias: TOOLCHAIN

run_order:
  - "00-system-base.yml"
  - "10-toolchain.yml"
  - "99-cleanup.yml"
