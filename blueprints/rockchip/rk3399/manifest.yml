# Alloy Blueprint: rockchip/rk3399
#
# Cross-compilation environment for Rockchip RK3399 (dual Cortex-A72 + quad Cortex-A55, aarch64).
# Provides aarch64 toolchain and CMake integration for kernel, drivers, and applications.
# BSP/Yocto builds can be layered on top using the generic/yocto-image-builder blueprint.
#
name: "Rockchip RK3399 Dev Environment"
version: "1.0.0"
description: "Cross-compilation toolchain and dev tools for Rockchip RK3399 (aarch64)."

variables:
  TOOLCHAIN_DEST: "/opt/rockchip/rk3399/toolchain"
  TOOLCHAIN_FILES_DIR: "/opt/rockchip/cmake"

supported_hosts:
  - linux/amd64
  - linux/arm64

toolchains:
  - ref: "toolchain.arm-gnu.aarch64-none-linux-gnu@stable"
    alias: TOOLCHAIN

run_order:
  - "00-system-base.yml"
  - "10-toolchain.yml"
  - "99-cleanup.yml"
