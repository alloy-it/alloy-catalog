#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print RK3588 environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== Rockchip RK3588 Dev Environment Ready ==="
    echo ""
    echo "aarch64 toolchain:"
    {{.Vars.TOOLCHAIN_DEST}}/bin/aarch64-none-linux-gnu-gcc --version | head -1
    echo ""
    echo "CMake toolchain: {{.Vars.TOOLCHAIN_FILES_DIR}}/rk3588.cmake"
    echo ""
    echo "Quick start:"
    echo "  cmake -DCMAKE_TOOLCHAIN_FILE={{.Vars.TOOLCHAIN_FILES_DIR}}/rk3588.cmake -B build"
    echo ""
    echo "For full BSP/Yocto builds, see: generic/yocto-image-builder"
    echo ""
