# Alloy Blueprint: generic/buildroot-image-builder
#
# Board-agnostic Buildroot environment for building custom Linux images.
#
name: "Generic Buildroot Image Builder"
version: "1.0.0"
description: "Board-agnostic Buildroot environment for building custom embedded Linux images."

variables:
  BUILDROOT_DEST: "/opt/buildroot"
  BUILDROOT_VERSION: "2024.02.3"

supported_hosts:
  - linux/amd64
  - linux/arm64

run_order:
  - "00-system-base.yml"
  - "10-buildroot.yml"
  - "99-cleanup.yml"
