#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print Buildroot environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== Generic Buildroot Image Builder Ready ==="
    echo ""
    echo "Buildroot directory: {{.Vars.BUILDROOT_DEST}}"
    echo "Version: {{.Vars.BUILDROOT_VERSION}}"
    echo ""
    echo "To build: cd {{.Vars.BUILDROOT_DEST}} && make menuconfig && make"
    echo ""
