#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print Rust embedded environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    export CARGO_HOME={{.Vars.CARGO_HOME}}
    export RUSTUP_HOME={{.Vars.RUSTUP_HOME}}
    echo "=== Generic Rust Embedded Dev Environment Ready ==="
    echo ""
    echo "Rust toolchain:"
    {{.Vars.CARGO_HOME}}/bin/rustup show active-toolchain
    echo ""
    echo "Cargo version:"
    {{.Vars.CARGO_HOME}}/bin/cargo --version
    echo ""
    echo "probe-rs version:"
    {{.Vars.CARGO_HOME}}/bin/probe-rs --version
    echo ""
    echo "Installed cross-compilation targets:"
    {{.Vars.CARGO_HOME}}/bin/rustup target list --installed | grep -v host
    echo ""
    echo "Quick start:"
    echo "  cargo generate --git https://github.com/rust-embedded/cortex-m-quickstart"
    echo "  cargo build --target thumbv7em-none-eabihf"
    echo "  probe-rs run --chip STM32F411RETx target/thumbv7em-none-eabihf/debug/app"
    echo ""
