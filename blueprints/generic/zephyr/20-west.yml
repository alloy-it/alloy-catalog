#
# 20-west.yml
# Install west and optionally init a Zephyr workspace.
#
- name: "Install West"
  action: "python_package"
  package: "west"
  version: "1.3.0"

- name: "Add west to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/20-west.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:/usr/local/bin
  mode: "USER_RWX GROUP_RX OTHER_RX"
