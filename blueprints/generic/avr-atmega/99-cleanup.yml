#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print AVR environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== Generic AVR ATmega Dev Environment Ready ==="
    echo ""
    echo "AVR toolchain:"
    avr-gcc --version | head -1
    echo ""
    echo "avr-libc version:"
    dpkg -s avr-libc 2>/dev/null | grep '^Version' || echo "(avr-libc not via dpkg)"
    echo ""
    echo "Quick start:"
    echo "  avr-gcc -mmcu=atmega328p -Os -o blink.elf blink.c"
    echo "  avr-objcopy -O ihex blink.elf blink.hex"
    echo "  avrdude -p m328p -c usbasp -U flash:w:blink.hex"
    echo ""
    echo "Targets: ATmega328P, ATmega2560, ATmega32U4, ATtiny85, and any AVR 8-bit MCU"
    echo ""
