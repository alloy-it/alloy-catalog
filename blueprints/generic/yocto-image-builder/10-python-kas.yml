#
# 10-python-kas.yml
# Install kas (Yocto/OpenEmbedded configuration tool) via catalog.
#
- name: "Install kas"
  action: "python_package"
  package: "kas"
  version: "4.3.2"

- name: "Add kas to PATH for all users"
  action: "write_env_file"
  file: "/etc/profile.d/10-kas.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:/usr/local/bin
  mode: "USER_RWX GROUP_RX OTHER_RX"
