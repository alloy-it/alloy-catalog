#
# 00-system-base.yml
# Base system packages for Yocto/OpenEmbedded builds.
#
- name: "Update APT cache"
  action: "run_command"
  reason: "apt-get update has no dedicated primitive; must run before any apt_install step."
  command: "apt-get update -y"
  always_run: true

- name: "Install Yocto build dependencies"
  action: "apt_install"
  packages:
    - "git"
    - "build-essential"
    - "cmake"
    - "ninja-build"
    - "gawk"
    - "wget"
    - "git-diff"
    - "diffstat"
    - "unzip"
    - "texinfo"
    - "gcc-multilib"
    - "libssl-dev"
    - "libncurses5-dev"
    - "python3"
    - "python3-pip"
    - "python3-venv"
    - "python3-dev"
    - "chrpath"
    - "socat"
    - "libsdl1.2-dev"
    - "xterm"
    - "cpio"
    - "file"
    - "ca-certificates"
    - "locales"

- name: "Allow passwordless sudo for sudo group"
  action: "run_command"
  reason: "Appending to /etc/sudoers has no dedicated primitive; echo redirect is the standard approach."
  command: "echo '%sudo	ALL=(ALL:ALL) NOPASSWD:ALL' >> /etc/sudoers"
  creates: "/etc/sudoers.d/alloy-sudoers"
