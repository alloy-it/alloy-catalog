#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print Yocto environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== Generic Yocto Image Builder Ready ==="
    echo ""
    echo "Build directory: {{.Vars.BUILD_DIR}}"
    echo "Kas version: $(kas --version 2>/dev/null || echo 'check PATH')"
    echo ""
    echo "To build: cd {{.Vars.BUILD_DIR}} && source oe-init-build-env && bitbake <target>"
    echo "Or use kas build from a kas config repo."
    echo ""
