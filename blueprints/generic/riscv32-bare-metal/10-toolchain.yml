#
# 10-toolchain.yml
# riscv32-unknown-elf bare-metal cross-compiler.
#
- name: "Create toolchain directories"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; creating both TOOLCHAIN_DEST and TOOLCHAIN_FILES_DIR in a single step."
  command: |
    mkdir -p {{.Vars.TOOLCHAIN_DEST}}
    mkdir -p {{.Vars.TOOLCHAIN_FILES_DIR}}
  creates: "{{.Vars.TOOLCHAIN_FILES_DIR}}"

- name: "Install riscv32 bare-metal toolchain"
  action: "unarchive_from_ref"
  ref: "toolchain.riscv-gnu.riscv32-unknown-elf@stable"
  dest: "{{.Vars.TOOLCHAIN_DEST}}"
  strip_components: 1
  creates: "{{.Vars.TOOLCHAIN_DEST}}/bin/riscv32-unknown-elf-gcc"
  mode: "USER_RWX GROUP_RX OTHER_RX"
  owner: "root:root"

- name: "Add toolchain to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/22-riscv32-toolchain.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:{{.Vars.TOOLCHAIN_DEST}}/bin
    export CROSS_COMPILE=riscv32-unknown-elf-
  mode: "USER_RWX GROUP_RX OTHER_RX"

- name: "Create CMake toolchain file for riscv32 bare-metal"
  action: "write_env_file"
  file: "{{.Vars.TOOLCHAIN_FILES_DIR}}/riscv32-elf.cmake"
  content: |
    # CMake Toolchain File for RISC-V 32-bit bare-metal (riscv32-unknown-elf)
    set(CMAKE_SYSTEM_NAME Generic)
    set(CMAKE_SYSTEM_PROCESSOR riscv)

    set(TOOLCHAIN_PREFIX riscv32-unknown-elf)
    set(TOOLCHAIN_PATH {{.Vars.TOOLCHAIN_DEST}})

    set(CMAKE_C_COMPILER   ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-gcc)
    set(CMAKE_CXX_COMPILER ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-g++)
    set(CMAKE_ASM_COMPILER ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-gcc)
    set(CMAKE_OBJCOPY      ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-objcopy)
    set(CMAKE_SIZE         ${TOOLCHAIN_PATH}/bin/${TOOLCHAIN_PREFIX}-size)

    # Do not search for libraries, headers, or programs in the host sysroot.
    set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
    set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
    set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
    set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
  mode: "USER_RW GROUP_R OTHER_R"
