#
# 30-toolchain.yml
# ARM 32-bit (arm-none-linux-gnueabihf) toolchain for STM32MP1 Cortex-A7.
#
- name: "Create toolchain destination"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; pre-creating the destination directory ensures subsequent archive extractions land in the correct location."
  command: "mkdir -p /opt/stm32mp157/toolchain"
  creates: "/opt/stm32mp157/toolchain"

- name: "Install ARM Linux toolchain (armhf)"
  action: "unarchive_from_ref"
  ref: "toolchain.arm-gnu.arm-none-linux-gnueabihf@stable"
  dest: "/opt/stm32mp157/toolchain"
  strip_components: 1
  creates: "/opt/stm32mp157/toolchain/bin/arm-none-linux-gnueabihf-gcc"
  mode: "USER_RWX GROUP_RX OTHER_RX"
  owner: "root:root"

- name: "Add toolchain to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/30-stm32mp-toolchain.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:/opt/stm32mp157/toolchain/bin
    export CROSS_COMPILE=arm-none-linux-gnueabihf-
  mode: "USER_RWX GROUP_RX OTHER_RX"
