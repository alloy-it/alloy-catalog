#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print STM32MP157-DK2 environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== ST STM32MP157-DK2 Dev Environment Ready ==="
    echo ""
    echo "Yocto build dir: {{.Vars.BUILD_DIR}}"
    echo "ARM toolchain: /opt/stm32mp157/toolchain/bin/arm-none-linux-gnueabihf-gcc"
    echo ""
    echo "For OpenSTLinux BSP, add meta-st-stm32mp to your kas config or bblayers.conf."
    echo ""
