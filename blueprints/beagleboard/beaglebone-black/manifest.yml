# Alloy Blueprint: beagleboard/beaglebone-black
#
# Cross-compilation environment for BeagleBone Black (TI AM335x, ARM Cortex-A8).
#
name: "BeagleBone Black Dev Environment"
version: "1.0.0"
description: "Cross-compilation toolchain and dev tools for BeagleBone Black (AM335x, armhf)."

variables:
  TOOLCHAIN_DEST: "/opt/cross-beaglebone/arm-linux-gnueabihf"
  TOOLCHAIN_FILES_DIR: "/opt/cross-beaglebone/cmake"

supported_hosts:
  - linux/amd64
  - linux/arm64

toolchains:
  - ref: "toolchain.arm-gnu.arm-none-linux-gnueabihf@stable"
    alias: TOOLCHAIN
  - ref: "sdk.golang.go@stable"
    alias: GOLANG

run_order:
  - "00-system-base.yml"
  - "10-host-tools.yml"
  - "20-toolchain.yml"
  - "99-cleanup.yml"
