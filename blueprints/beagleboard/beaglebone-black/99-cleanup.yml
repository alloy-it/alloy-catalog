#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print BeagleBone Black environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== BeagleBone Black Dev Environment Ready ==="
    echo ""
    echo "ARM toolchain: {{.Vars.TOOLCHAIN_DEST}}/bin/arm-none-linux-gnueabihf-gcc"
    echo "CMake toolchain: {{.Vars.TOOLCHAIN_FILES_DIR}}/beaglebone-black.cmake"
    echo ""
    echo "Build with: cmake -DCMAKE_TOOLCHAIN_FILE={{.Vars.TOOLCHAIN_FILES_DIR}}/beaglebone-black.cmake ..."
    echo ""
