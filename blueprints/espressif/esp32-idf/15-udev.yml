#
# 15-udev.yml
# udev rules for ESP32 USB (SiLabs CP210x, Espressif USB JTAG/serial).
#
- name: "Configure udev rules for ESP32 devices"
  action: "write_env_file"
  file: "/etc/udev/rules.d/99-espressif.rules"
  content: |
    # SiLabs CP210x (common on ESP32 dev boards)
    SUBSYSTEM=="usb", ATTR{idVendor}=="10c4", MODE="0666", GROUP="plugdev"
    # Espressif USB JTAG/serial
    SUBSYSTEM=="usb", ATTR{idVendor}=="303a", MODE="0666", GROUP="plugdev"
  mode: "USER_RW GROUP_R OTHER_R"

- name: "Reload udev rules"
  action: "run_command"
  reason: "udevadm control and trigger have no dedicated primitive; inline udev rules are written with write_env_file and must be reloaded separately."
  command: "udevadm control --reload-rules && udevadm trigger"
  always_run: true
  skip_if: "[ \"$ALLOY_BACKEND\" = \"wsl2\" ]"
