#
# 20-env.yml
# Set IDF_PATH and export script for ESP-IDF.
#
- name: "Add ESP-IDF environment to profile"
  action: "write_env_file"
  file: "/etc/profile.d/30-esp-idf.sh"
  content: |
    #!/bin/sh
    export IDF_PATH={{.Vars.IDF_DEST}}
    if [ -f "{{.Vars.IDF_DEST}}/export.sh" ]; then
      . "{{.Vars.IDF_DEST}}/export.sh" >/dev/null 2>&1 || true
    fi
  mode: "USER_RWX GROUP_RX OTHER_RX"
