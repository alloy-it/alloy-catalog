#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print ESP-IDF environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== Espressif ESP32 ESP-IDF Dev Environment Ready ==="
    echo ""
    echo "IDF_PATH={{.Vars.IDF_DEST}}"
    echo "Before building, run: . {{.Vars.IDF_DEST}}/export.sh"
    echo ""
    echo "Example: cd /opt/esp-idf/examples/get-started/hello_world && . {{.Vars.IDF_DEST}}/export.sh && idf.py build"
    echo ""
