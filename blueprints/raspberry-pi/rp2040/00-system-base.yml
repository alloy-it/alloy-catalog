#
# 00-system-base.yml
# Base system packages for RP2040/Pico SDK development.
#
- name: "Update APT cache"
  action: "run_command"
  reason: "apt-get update has no dedicated primitive; must run before any apt_install step."
  command: "apt-get update -y"
  always_run: true

- name: "Install build tools"
  action: "apt_install"
  packages:
    - "git"
    - "build-essential"
    - "cmake"
    - "ninja-build"
    - "wget"
    - "curl"
    - "python3"
    - "ca-certificates"

- name: "Allow passwordless sudo for sudo group"
  action: "run_command"
  reason: "Appending to /etc/sudoers has no dedicated primitive; echo redirect is the standard approach."
  command: "echo '%sudo	ALL=(ALL:ALL) NOPASSWD:ALL' >> /etc/sudoers"
  creates: "/etc/sudoers.d/alloy-sudoers"

- name: "Configure udev rules for RP2040 devices"
  action: "write_env_file"
  file: "/etc/udev/rules.d/99-rp2040.rules"
  content: |
    # RP2040 BOOTSEL mode (picotool / UF2 flashing)
    SUBSYSTEM=="usb", ATTRS{idVendor}=="2e8a", ATTRS{idProduct}=="0003", MODE="0666", GROUP="plugdev"
    # Raspberry Pi Debug Probe
    SUBSYSTEM=="usb", ATTRS{idVendor}=="2e8a", ATTRS{idProduct}=="000c", MODE="0666", GROUP="plugdev"
    # Picoprobe (legacy)
    SUBSYSTEM=="usb", ATTRS{idVendor}=="2e8a", ATTRS{idProduct}=="0004", MODE="0666", GROUP="plugdev"
  mode: "USER_RW GROUP_R OTHER_R"

- name: "Reload udev rules"
  action: "run_command"
  reason: "udevadm control and trigger have no dedicated primitive beyond udev_rules (which requires a URL); inline rules are managed with write_env_file."
  command: "udevadm control --reload-rules && udevadm trigger"
  always_run: true
  skip_if: "[ \"$ALLOY_BACKEND\" = \"wsl2\" ]"
