#
# 20-pico-sdk.yml
# Clone Pico SDK (no install script; submodules initialized by mcu_sdk git).
#
- name: "Install Pico SDK"
  action: "mcu_sdk"
  method: "git"
  url: "{{.Vars.PICO_SDK_URL}}"
  version: "{{.Vars.PICO_SDK_VERSION}}"
  dest: "{{.Vars.PICO_SDK_DEST}}"
  packages:
    - "git"
  creates: "{{.Vars.PICO_SDK_DEST}}/pico_sdk_import.cmake"

- name: "Initialize Pico SDK submodules"
  action: "run_command"
  reason: "git submodule update has no dedicated primitive; submodule init is required to fetch TinyUSB and other dependencies bundled in the Pico SDK."
  command: |
    cd {{.Vars.PICO_SDK_DEST}} && git submodule update --init
  creates: "{{.Vars.PICO_SDK_DEST}}/lib/tinyusb/.git"

- name: "Set PICO_SDK_PATH environment"
  action: "write_env_file"
  file: "/etc/profile.d/21-pico-sdk.sh"
  content: |
    #!/bin/sh
    export PICO_SDK_PATH={{.Vars.PICO_SDK_DEST}}
  mode: "USER_RWX GROUP_RX OTHER_RX"
