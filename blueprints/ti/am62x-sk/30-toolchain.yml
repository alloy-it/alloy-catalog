#
# 30-toolchain.yml
# aarch64 cross-compiler for AM62x Cortex-A53.
#
- name: "Create toolchain destination"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; pre-creating the destination directory ensures subsequent archive extractions land in the correct location."
  command: "mkdir -p {{.Vars.TOOLCHAIN_DEST}}"
  creates: "{{.Vars.TOOLCHAIN_DEST}}"

- name: "Install aarch64 Linux toolchain"
  action: "unarchive_from_ref"
  ref: "toolchain.arm-gnu.aarch64-none-linux-gnu@stable"
  dest: "{{.Vars.TOOLCHAIN_DEST}}"
  strip_components: 1
  creates: "{{.Vars.TOOLCHAIN_DEST}}/bin/aarch64-none-linux-gnu-gcc"
  mode: "USER_RWX GROUP_RX OTHER_RX"
  owner: "root:root"

- name: "Add toolchain to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/30-ti-am62x-toolchain.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:{{.Vars.TOOLCHAIN_DEST}}/bin
    export CROSS_COMPILE=aarch64-none-linux-gnu-
  mode: "USER_RWX GROUP_RX OTHER_RX"
