#
# 00-system-base.yml
# Base system packages for TI AM62x Yocto builds.
#
- name: "Update APT cache"
  action: "run_command"
  reason: "apt-get update has no dedicated primitive; must run before any apt_install step."
  command: "apt-get update -y"
  always_run: true

- name: "Install Yocto build dependencies"
  action: "apt_install"
  packages:
    - "git"
    - "build-essential"
    - "cmake"
    - "ninja-build"
    - "gawk"
    - "wget"
    - "curl"
    - "diffstat"
    - "unzip"
    - "texinfo"
    - "gcc-multilib"
    - "libssl-dev"
    - "libncurses5-dev"
    - "python3"
    - "python3-pip"
    - "python3-venv"
    - "python3-dev"
    - "chrpath"
    - "socat"
    - "cpio"
    - "file"
    - "ca-certificates"
    - "locales"

- name: "Configure locale for Yocto"
  action: "run_command"
  reason: "Yocto requires a UTF-8 locale; locale-gen has no dedicated primitive."
  command: |
    locale-gen en_US.UTF-8
    update-locale LANG=en_US.UTF-8
  creates: "/etc/locale.gen"

- name: "Allow passwordless sudo for sudo group"
  action: "run_command"
  reason: "Appending to /etc/sudoers has no dedicated primitive; echo redirect is the standard approach."
  command: "echo '%sudo	ALL=(ALL:ALL) NOPASSWD:ALL' >> /etc/sudoers"
  creates: "/etc/sudoers.d/alloy-sudoers"
