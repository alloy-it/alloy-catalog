#
# 20-yocto-checkout.yml
# Initialize TI arago Yocto layers using kas.
#
- name: "Create build directory"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; pre-creating the build directory ensures subsequent Yocto/repo initialization commands have a valid working directory."
  command: "mkdir -p {{.Vars.BUILD_DIR}}"
  creates: "{{.Vars.BUILD_DIR}}"

- name: "Configure TI arago Yocto layers with kas"
  action: "yocto_manifest"
  tool: "kas"
  url: "{{.Vars.KAS_CONFIG_URL}}"
  file: "{{.Vars.KAS_CONFIG_FILE}}"
  dest: "{{.Vars.BUILD_DIR}}"
  creates: "{{.Vars.BUILD_DIR}}/conf/local.conf"
