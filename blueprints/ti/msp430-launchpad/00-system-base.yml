#
# 00-system-base.yml
# Base system packages for TI MSP430 development.
#
- name: "Update APT cache"
  action: "run_command"
  reason: "apt-get update has no dedicated primitive; must run before any apt_install step."
  command: "apt-get update -y"
  always_run: true

- name: "Install build tools"
  action: "apt_install"
  packages:
    - "git"
    - "build-essential"
    - "cmake"
    - "ninja-build"
    - "make"
    - "wget"
    - "ca-certificates"
    - "python3"
    - "python3-pip"
    - "libusb-1.0-0-dev"
    - "libhidapi-dev"

- name: "Allow passwordless sudo for sudo group"
  action: "run_command"
  reason: "Appending to /etc/sudoers has no dedicated primitive; echo redirect is the standard approach."
  command: "echo '%sudo	ALL=(ALL:ALL) NOPASSWD:ALL' >> /etc/sudoers"
  creates: "/etc/sudoers.d/alloy-sudoers"
