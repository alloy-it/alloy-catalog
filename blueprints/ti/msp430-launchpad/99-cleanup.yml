#
# 99-cleanup.yml
# Final cleanup and environment summary.
#
- name: "Clean APT cache"
  action: "run_command"
  reason: "apt-get clean has no dedicated primitive; removing package lists shrinks the final image."
  always_run: true
  command: |
    apt-get clean
    rm -rf /var/lib/apt/lists/*

- name: "Print MSP430 environment summary"
  action: "run_command"
  reason: "Printing a post-install version summary has no dedicated primitive; echo commands verify the environment is ready."
  always_run: true
  command: |
    echo "=== TI MSP430 LaunchPad Dev Environment Ready ==="
    echo ""
    echo "MSP430 toolchain:"
    {{.Vars.TOOLCHAIN_DEST}}/bin/msp430-elf-gcc --version | head -1
    echo ""
    echo "Quick start:"
    echo "  msp430-elf-gcc -mmcu=msp430g2553 -Os -o blink.elf blink.c"
    echo "  msp430-elf-objcopy -O ihex blink.elf blink.hex"
    echo ""
    echo "Supported targets: MSP430G2553, MSP430F5529, MSP430FR6989, and any MSP430 variant"
    echo ""
