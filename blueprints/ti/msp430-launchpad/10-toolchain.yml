#
# 10-toolchain.yml
# TI MSP430 GCC toolchain installation.
#
- name: "Create toolchain directory"
  action: "run_command"
  reason: "mkdir has no dedicated primitive; creating TOOLCHAIN_DEST before extraction."
  command: "mkdir -p {{.Vars.TOOLCHAIN_DEST}}"
  creates: "{{.Vars.TOOLCHAIN_DEST}}"

- name: "Install MSP430 GCC toolchain"
  action: "unarchive_from_ref"
  ref: "toolchain.ti.msp430-elf-gcc@stable"
  dest: "{{.Vars.TOOLCHAIN_DEST}}"
  strip_components: 1
  creates: "{{.Vars.TOOLCHAIN_DEST}}/bin/msp430-elf-gcc"
  mode: "USER_RWX GROUP_RX OTHER_RX"
  owner: "root:root"

- name: "Add MSP430 toolchain to PATH"
  action: "write_env_file"
  file: "/etc/profile.d/31-msp430-toolchain.sh"
  content: |
    #!/bin/sh
    export PATH=$PATH:{{.Vars.TOOLCHAIN_DEST}}/bin
    export CROSS_COMPILE=msp430-elf-
  mode: "USER_RWX GROUP_RX OTHER_RX"

- name: "Install MSP430 LaunchPad udev rules"
  action: "write_env_file"
  file: "/etc/udev/rules.d/99-msp430.rules"
  content: |
    # TI MSP430 eZ-FET debug probe (LaunchPad onboard)
    SUBSYSTEM=="usb", ATTRS{idVendor}=="0451", ATTRS{idProduct}=="f432", MODE="0666", GROUP="plugdev"
    # TI XDS110 debug probe
    SUBSYSTEM=="usb", ATTRS{idVendor}=="0451", ATTRS{idProduct}=="bef3", MODE="0666", GROUP="plugdev"
    # TI MSP430 BSL (bootstrap loader)
    SUBSYSTEM=="usb", ATTRS{idVendor}=="2047", ATTRS{idProduct}=="0200", MODE="0666", GROUP="plugdev"
  mode: "USER_RW GROUP_R OTHER_R"
