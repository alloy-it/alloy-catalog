spec_version: 1
id: sdk.nordic.nrf-connect-sdk
version: "2.6.1"

name: "nRF Connect SDK"
homepage: "https://developer.nordicsemi.com/nRF_Connect_SDK/doc/latest/nrf/index.html"
license: "Apache-2.0"

capabilities:
  - sdk.nordic
  - rtos.zephyr
  - target.arm-none-eabi
  - target.cortex-m
  - target.nrf91
  - target.nrf52
  - target.nrf53

providers:
  - id: west
    method: west
    host_platforms:
      linux/amd64:
        url: "https://github.com/nrfconnect/sdk-nrf"
        version: "v2.6.1"
      linux/arm64:
        url: "https://github.com/nrfconnect/sdk-nrf"
        version: "v2.6.1"

install_hints:
  creates: "nrf"
  requires_tool: "west"
  env_vars:
    ZEPHYR_BASE: "{dest}/zephyr"

lifecycle:
  status: stable
  released_at: "2024-03-01"
