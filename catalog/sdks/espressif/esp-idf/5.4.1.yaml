spec_version: 1
id: sdk.espressif.esp-idf
version: "5.4.1"

name: "ESP-IDF — Espressif IoT Development Framework"
homepage: "https://docs.espressif.com/projects/esp-idf/en/stable/esp32/index.html"
license: "Apache-2.0"

capabilities:
  - sdk.espressif
  - target.esp32
  - target.esp32s3
  - target.esp32c3
  - target.esp32c6
  - target.esp32h2
  - target.xtensa
  - target.riscv32

providers:
  - id: git
    method: git
    url: "https://github.com/espressif/esp-idf.git"
    version: "v5.4.1"

install_hints:
  creates: "tools/idf.py"
  note: |
    Use the mcu_sdk action with method: git.
    After clone, run install.sh with the target chips as install_args, e.g.:
      file: install.sh
      install_args: [esp32, esp32s3]
    Required system packages: git, cmake, ninja-build, python3, python3-pip
  env_vars:
    IDF_PATH: "{dest}"

lifecycle:
  status: stable
  released_at: "2025-01-15"
